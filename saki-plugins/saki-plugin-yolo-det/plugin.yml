plugin_id: "yolo_det_v1"
version: "3.0.0"
display_name: "YOLO Detection"
sdk_version: ">=4.0.0"

supported_task_types:
  - train
  - score
  - predict
  - eval
  - custom

supported_strategies:
  - aug_iou_disagreement
  - uncertainty_1_minus_max_conf
  - random_baseline

supported_accelerators:
  - cuda
  - mps
  - cpu

supports_auto_fallback: true

runtime_profiles:
  - id: "cuda"
    priority: 10
    when: "host.backends.includes('cuda')"
    dependency_groups:
      - "profile-cuda"
    allowed_backends:
      - "cuda"

  - id: "mps"
    priority: 20
    when: "host.backends.includes('mps')"
    dependency_groups:
      - "profile-mps"
    allowed_backends:
      - "mps"

  - id: "cpu"
    priority: 100
    when: "host.backends.includes('cpu')"
    dependency_groups:
      - "profile-cpu"
    allowed_backends:
      - "cpu"

# -------------------------------------------------------------------
# 简化版配置 Schema
# -------------------------------------------------------------------
# 条件表达式语法：
#   visible: "form.field_name === 'value'"      # 字段依赖
#   visible: "ctx.annotation_types.includes('rect')"  # 上下文依赖
#   props: { min: 1, max: 5000, step: 1 }        # UI 属性映射
# -------------------------------------------------------------------
config_schema:
  title: "YOLO Detection Request Config"
  description: "YOLO 检测模型配置，支持 detect 和 OBB 两种任务模式"

  fields:
    # YOLO Task Mode - 使用上下文条件
    - key: yolo_task
      label: YOLO Task Mode
      type: select
      required: true
      default: "detect"
      options:
        - label: "Standard Detection (detect)"
          value: "detect"
          visible: "ctx.annotation_types.includes('rect')"
        - label: "Oriented Bounding Box (OBB)"
          value: "obb"

    # 训练参数组
    - key: epochs
      label: 训练轮数
      type: integer
      default: 30
      description: fixed_epochs 模式直接使用；target_updates 模式下仅作展示，不参与实际训练
      props:
        min: 1
        max: 5000
        step: 1

    - key: batch
      label: 批量大小
      type: integer
      default: 16
      props:
        min: 1
        max: 2048

    - key: imgsz
      label: 图像尺寸
      type: integer
      default: 640
      props:
        min: 64
        max: 4096
        step: 32

    - key: patience
      label: 早停耐心值
      type: integer
      default: 20
      description: target_updates 且 budget_disable_early_stop=true 时会被自动覆盖为 effective_epochs + 1
      props:
        min: 1
        max: 1000

    - key: train_budget_mode
      label: 训练预算模式
      type: select
      default: "fixed_epochs"
      description: fixed_epochs 直接使用训练轮数；target_updates 按目标更新步数自动换算轮数
      options:
        - label: 固定轮数
          value: fixed_epochs
        - label: 目标更新步数
          value: target_updates

    - key: target_updates
      label: 目标更新步数
      type: integer
      description: 仅在 target_updates 模式下生效，按 train_sample_count 和 batch 自动换算训练轮数
      props:
        min: 1
        max: 1000000
        step: 1
      visible: "form.train_budget_mode === 'target_updates'"

    - key: min_epochs
      label: 最小训练轮数
      type: integer
      default: 1
      props:
        min: 1
        max: 5000
        step: 1
      visible: "form.train_budget_mode === 'target_updates'"

    - key: max_epochs
      label: 最大训练轮数
      type: integer
      default: 1000
      props:
        min: 1
        max: 5000
        step: 1
      visible: "form.train_budget_mode === 'target_updates'"

    - key: budget_disable_early_stop
      label: 预算模式禁用早停
      type: boolean
      default: true
      description: 开启后 target_updates 模式会强制将 patience 设为 effective_epochs + 1
      visible: "form.train_budget_mode === 'target_updates'"

    - key: cache
      label: 资源缓存
      type: boolean
      default: false
      description: 开启后使用内存缓存训练资源（Ultralytics cache=ram）

    - key: workers
      label: DataLoader 线程数
      type: integer
      default: 2
      description: 训练加载数据使用的 worker 数；0 表示主进程加载
      props:
        min: 0
        max: 32
        step: 1

    # 预测参数组
    - key: predict_conf
      label: 预测置信度
      type: number
      default: 0.1
      props:
        min: 0.0
        max: 1.0
        step: 0.05

    - key: aug_iou_enabled_augs
      label: aug_iou 增强项
      type: multi_select
      required: true
      description: 仅在 aug_iou_disagreement 下生效，且必须包含 identity
      default:
        - identity
        - hflip
        - vflip
        - rot90
        - rot180
        - rot270
        - transpose
        - transverse
        - bright
        - dark
        - contrast_up
        - affine_rot_p12
        - affine_rot_m12
      options:
        - label: identity
          value: identity
        - label: hflip
          value: hflip
        - label: vflip
          value: vflip
        - label: rot90
          value: rot90
        - label: rot180
          value: rot180
        - label: rot270
          value: rot270
        - label: transpose
          value: transpose
        - label: transverse
          value: transverse
        - label: bright
          value: bright
        - label: dark
          value: dark
        - label: contrast_up
          value: contrast_up
        - label: affine_rot_p12
          value: affine_rot_p12
        - label: affine_rot_m12
          value: affine_rot_m12
      visible: "ctx.sampling_strategy === 'aug_iou_disagreement'"

    - key: aug_iou_iou_mode
      label: aug_iou IoU 计算方式
      type: select
      required: true
      default: "obb"
      description: rect=标准AABB，obb=旋转框IoU，boundary=边界带IoU
      options:
        - label: rect (AABB)
          value: rect
        - label: obb (polygon)
          value: obb
        - label: boundary (needs d)
          value: boundary
      visible: "ctx.sampling_strategy === 'aug_iou_disagreement'"

    - key: aug_iou_boundary_d
      label: boundary IoU 边界厚度 d
      type: integer
      required: true
      default: 3
      description: 仅在 aug_iou_iou_mode=boundary 时生效，单位像素
      props:
        min: 1
        max: 128
        step: 1
      visible: "ctx.sampling_strategy === 'aug_iou_disagreement' && form.aug_iou_iou_mode === 'boundary'"

    - key: aug_iou_sample_batch_size
      label: aug_iou 样本批大小
      type: integer
      required: true
      default: 8
      description: score 阶段每轮送入增强流水线的样本数；总增强视图数约为 sample_batch_size * enabled_augs
      props:
        min: 1
        max: 64
        step: 1
      visible: "ctx.sampling_strategy === 'aug_iou_disagreement'"

    - key: aug_iou_pipeline_workers
      label: aug_iou CPU 流水线线程数
      type: integer
      required: true
      default: 4
      description: score 阶段用于读图、增强、逆变换与打分的线程数
      props:
        min: 1
        max: 32
        step: 1
      visible: "ctx.sampling_strategy === 'aug_iou_disagreement'"

    - key: val_split_ratio
      label: 验证集比例
      type: number
      default: 0.2
      props:
        min: 0.05
        max: 0.5
        step: 0.05

    # 模型配置
    - key: model_source
      label: 模型来源
      type: select
      required: true
      default: "preset"
      options:
        - label: 预设模型
          value: "preset"
        - label: 本地自定义
          value: "custom_local"
        - label: URL 自定义
          value: "custom_url"

    - key: init_mode
      label: 初始化模式
      type: select
      required: true
      default: "checkpoint_direct"
      description: checkpoint_direct=直接加载检查点；arch_yaml_plus_weights=先按 YAML 构建再部分加载权重
      options:
        - label: 直接检查点加载（兼容默认）
          value: "checkpoint_direct"
        - label: YAML 架构 + 权重迁移
          value: "arch_yaml_plus_weights"

    - key: model_arch_source
      label: 架构来源
      type: select
      required: true
      default: "builtin"
      options:
        - label: 内置架构
          value: "builtin"
        - label: 本地 YAML
          value: "custom_local"
      visible: "form.init_mode === 'arch_yaml_plus_weights'"

    - key: model_arch_preset
      label: 架构预设
      type: select
      default: null
      options:
        - label: "YOLOv8n.yaml"
          value: "yolov8n.yaml"
          visible: "form.yolo_task === 'detect'"
        - label: "YOLOv8s.yaml"
          value: "yolov8s.yaml"
          visible: "form.yolo_task === 'detect'"
        - label: "YOLOv8m.yaml"
          value: "yolov8m.yaml"
          visible: "form.yolo_task === 'detect'"
        - label: "YOLOv8l.yaml"
          value: "yolov8l.yaml"
          visible: "form.yolo_task === 'detect'"
        - label: "YOLOv8x.yaml"
          value: "yolov8x.yaml"
          visible: "form.yolo_task === 'detect'"
        - label: "YOLOv8n-OBB.yaml"
          value: "yolov8n-obb.yaml"
          visible: "form.yolo_task === 'obb'"
        - label: "YOLOv8s-OBB.yaml"
          value: "yolov8s-obb.yaml"
          visible: "form.yolo_task === 'obb'"
        - label: "YOLOv8m-OBB.yaml"
          value: "yolov8m-obb.yaml"
          visible: "form.yolo_task === 'obb'"
        - label: "YOLOv8l-OBB.yaml"
          value: "yolov8l-obb.yaml"
          visible: "form.yolo_task === 'obb'"
        - label: "YOLOv8x-OBB.yaml"
          value: "yolov8x-obb.yaml"
          visible: "form.yolo_task === 'obb'"
      visible: "form.init_mode === 'arch_yaml_plus_weights' && form.model_arch_source === 'builtin'"

    - key: model_arch_custom_ref
      label: 架构 YAML 路径
      type: string
      default: ""
      props:
        placeholder: "/path/to/model.yaml"
      visible: "form.init_mode === 'arch_yaml_plus_weights' && form.model_arch_source === 'custom_local'"

    # 模型预设 - 依赖 yolo_task，使用 visible 表达式
    - key: model_preset
      label: 预设模型
      type: select
      options:
        # detect 专用
        - label: "YOLOv8n"
          value: "yolov8n.pt"
          visible: "form.yolo_task === 'detect'"
        - label: "YOLOv8s"
          value: "yolov8s.pt"
          visible: "form.yolo_task === 'detect'"
        - label: "YOLOv8m"
          value: "yolov8m.pt"
          visible: "form.yolo_task === 'detect'"
        - label: "YOLOv8l"
          value: "yolov8l.pt"
          visible: "form.yolo_task === 'detect'"
        - label: "YOLOv8x"
          value: "yolov8x.pt"
          visible: "form.yolo_task === 'detect'"
        # obb 专用
        - label: "YOLOv8n-OBB"
          value: "yolov8n-obb.pt"
          visible: "form.yolo_task === 'obb'"
        - label: "YOLOv8s-OBB"
          value: "yolov8s-obb.pt"
          visible: "form.yolo_task === 'obb'"
        - label: "YOLOv8m-OBB"
          value: "yolov8m-obb.pt"
          visible: "form.yolo_task === 'obb'"
        - label: "YOLOv8l-OBB"
          value: "yolov8l-obb.pt"
          visible: "form.yolo_task === 'obb'"
        - label: "YOLOv8x-OBB"
          value: "yolov8x-obb.pt"
          visible: "form.yolo_task === 'obb'"
      # 默认值需要根据 yolo_task 动态选择
      # 这里设置为 null，由前端或运行时根据上下文选择
      default: null

    # 自定义模型路径 - 仅在非预设模式时可见
    - key: model_custom_ref
      label: 自定义模型路径
      type: string
      default: ""
      props:
        placeholder: "/path/to/model.pt 或 https://..."
      visible: "form.model_source !== 'preset'"

    - key: device
      label: 设备
      type: string
      default: "auto"
      props:
        placeholder: "auto, cpu, 0, 1, mps"

entrypoint: "saki_plugin_yolo_det.worker:main"
