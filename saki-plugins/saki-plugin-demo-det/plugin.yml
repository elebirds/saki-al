plugin_id: "demo_det_v1"
version: "3.0.0"
display_name: "Demo Detection (Mock)"
sdk_version: ">=4.0.0"

supported_task_types:
  - train
  - score
  - predict
  - eval
  - custom

supported_strategies:
  - uncertainty_1_minus_max_conf
  - aug_iou_disagreement
  - random_baseline

supported_accelerators:
  - cpu

supports_auto_fallback: true

runtime_profiles:
  - id: "cpu"
    priority: 100
    when: "host.backends.includes('cpu')"
    dependency_groups:
      - "profile-cpu"
    allowed_backends:
      - "cpu"

config_schema:
  title: "Demo Detection Request Config"
  fields:
    - key: epochs
      label: Epochs
      type: integer
      required: true
      default: 5
      min: 1
      max: 500
    - key: batch_size
      label: Batch Size
      type: integer
      required: true
      default: 8
      min: 1
      max: 2048
    - key: steps_per_epoch
      label: Steps / Epoch
      type: integer
      required: false
      default: 20
      min: 1
      max: 5000

entrypoint: "saki_plugin_demo_det.worker:main"
