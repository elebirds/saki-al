name: controlplane-ci

on:
  pull_request:
    paths:
      - "saki-controlplane/**"
  push:
    branches:
      - main
    paths:
      - "saki-controlplane/**"

jobs:
  controlplane:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: saki-controlplane
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"

      - name: Install protobuf generators
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.11
          go install connectrpc.com/connect/cmd/protoc-gen-connect-go@v1.18.1

      - name: Check generation drift
        run: make check-gen

      - name: Run public API smoke test
        run: make smoke-public-api

      - name: Run tests
        run: go test ./...

      - name: Run vet
        run: go vet ./...
