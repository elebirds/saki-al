services:
  saki-api:
    build:
      context: ./saki-api
      dockerfile: Dockerfile
    container_name: saki-api
    ports:
      - "8000:8000"
      - "50051:50051"
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://${POSTGRES_USER:-saki}:${POSTGRES_PASSWORD:-saki_password}@postgres:5432/${POSTGRES_DB:-saki}}
      - SECRET_KEY=${SECRET_KEY:-YOUR_SUPER_SECRET_KEY_CHANGE_ME_IN_PRODUCTION}
      - BACKEND_CORS_ORIGINS=${BACKEND_CORS_ORIGINS:-["http://localhost:3000","http://localhost:5173","http://localhost"]}
      - UPLOAD_DIR=/app/data/uploads
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - REDIS_KEY_PREFIX=${REDIS_KEY_PREFIX:-saki}
      - REDIS_WORKING_TTL_SECONDS=${REDIS_WORKING_TTL_SECONDS:-86400}
      - INTERNAL_TOKEN=${INTERNAL_TOKEN:-dev-secret}
      - RUNTIME_GRPC_BIND=${RUNTIME_GRPC_BIND:-0.0.0.0:50051}
      - RUNTIME_HEARTBEAT_TIMEOUT_SEC=${RUNTIME_HEARTBEAT_TIMEOUT_SEC:-30}
      - RUNTIME_DISPATCH_INTERVAL_SEC=${RUNTIME_DISPATCH_INTERVAL_SEC:-3}
      - RUNTIME_UPLOAD_URL_EXPIRE_HOURS=${RUNTIME_UPLOAD_URL_EXPIRE_HOURS:-2}
      - RUNTIME_MAX_RETRY_COUNT=${RUNTIME_MAX_RETRY_COUNT:-2}
      - RUNTIME_RETRY_BASE_DELAY_SEC=${RUNTIME_RETRY_BASE_DELAY_SEC:-10}
      - RUNTIME_ASSIGN_ACK_TIMEOUT_SEC=${RUNTIME_ASSIGN_ACK_TIMEOUT_SEC:-30}
      - RUNTIME_STREAM_REJECT_CLOSE=${RUNTIME_STREAM_REJECT_CLOSE:-true}
      - RUNTIME_REQUEST_IDEMPOTENCY_TTL_SEC=${RUNTIME_REQUEST_IDEMPOTENCY_TTL_SEC:-600}
      - RUNTIME_REQUEST_IDEMPOTENCY_MAX_ENTRIES=${RUNTIME_REQUEST_IDEMPOTENCY_MAX_ENTRIES:-2048}
      - RUNTIME_EXECUTOR_ALLOWLIST=${RUNTIME_EXECUTOR_ALLOWLIST:-[]}
    volumes:
      # 持久化数据库和上传文件
      - ./saki-api/data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    networks:
      - saki-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3

  saki-web:
    build:
      context: ./saki-web
      dockerfile: Dockerfile
      args:
        # 构建时设置 API 地址，如果使用 nginx 代理，可以设置为相对路径
        - VITE_API_BASE_URL=${VITE_API_BASE_URL:-/api/v1}
    container_name: saki-web
    ports:
      - "80:80"
    depends_on:
      - saki-api
    restart: unless-stopped
    networks:
      - saki-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
  postgres:
    image: postgres:16-alpine
    container_name: saki-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-saki}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - saki-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-saki}"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: saki-minio
    ports:
      - "9000:9000"      # API 端口
      - "9001:9001"      # 控制台端口
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - ./data/minio:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
  redis:
    image: redis:7-alpine
    container_name: saki-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - saki-network
networks:
  saki-network:
    driver: bridge
