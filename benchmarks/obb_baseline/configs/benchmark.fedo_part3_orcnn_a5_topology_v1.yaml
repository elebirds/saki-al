benchmark_name: fedo_part3_orcnn_a5_topology_v1
split_manifest_path: ""
dataset:
  dota_root: "__SET_ME__/dota_export"
  yolo_obb_root: "__SET_ME__/yolo_obb_export"
  classes: [pattern_a, pattern_b, pattern_c]
models:
  - oriented_rcnn_r50
runtime:
  device: "0"
  score_thr: 0.05
  link_mode: symlink
  stream_logs: false
  mmrotate_batch_size: 4
  mmrotate_workers: 8
  mmrotate_amp: true
  mmrotate_epochs: 36
  mmrotate_train_aug_preset: spectrogram_v1
  mmrotate_anchor_ratio_preset: slender_v1
  mmrotate_roi_bbox_loss_preset: gwd
  mmrotate_boundary_aux_preset: boundary_v1
  mmrotate_topology_aux_preset: topology_v1
  yolo_imgsz: 960
  yolo_batch_size: 16
  yolo_workers: 16
  yolo_amp: true
  yolo_mosaic: 0.0
  yolo_close_mosaic: 0
  yolo_epochs: 200
