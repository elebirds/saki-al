version: "2"
sql:
  - engine: "postgresql"
    schema: "migrations"
    queries: "queries/project"
    gen:
      go:
        package: "sqlcdb"
        out: "../internal/gen/sqlc"
        sql_package: "pgx/v5"
        emit_interface: false
        emit_json_tags: true
        overrides:
          - db_type: "uuid"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
