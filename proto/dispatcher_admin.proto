syntax = "proto3";

package saki.dispatcher.admin.v1;
option go_package = "github.com/elebirds/saki/saki-dispatcher/internal/gen/dispatcheradminv1;dispatcheradminv1";

message LoopCommandRequest {
  string command_id = 1;
  string loop_id = 2;
}

message ConfirmLoopRequest {
  string command_id = 1;
  string loop_id = 2;
  bool force = 3;
}

message JobCommandRequest {
  string command_id = 1;
  string job_id = 2;
  string reason = 3;
}

message TaskCommandRequest {
  string command_id = 1;
  string task_id = 2;
  string reason = 3;
}

message RoundCommandRequest {
  string command_id = 1;
  string round_id = 2;
  string reason = 3;
}

message StepCommandRequest {
  string command_id = 1;
  string step_id = 2;
  string reason = 3;
}

message TriggerDispatchRequest {
  string command_id = 1;
  string step_id = 2;
  string task_id = 3; // deprecated alias
}

message CommandResponse {
  string command_id = 1;
  string status = 2;
  string message = 3;
  string request_id = 4;
}

message RuntimeSummaryRequest {}

message RuntimeSummaryResponse {
  int64 online_executors = 1;
  int64 busy_executors = 2;
  int64 pending_assign_count = 3;
  int64 pending_stop_count = 4;
  int64 queued_task_count = 5;
  string latest_heartbeat_at = 6;
}

message ExecutorReadRequest {
  string executor_id = 1;
}

message ExecutorListRequest {}

message ExecutorRead {
  string executor_id = 1;
  string version = 2;
  string status = 3;
  bool is_online = 4;
  string current_step_id = 5;
  string last_seen_at = 6;
  string last_error = 7;
  int64 pending_assign_count = 8;
  int64 pending_stop_count = 9;
  string current_task_id = 101 [deprecated = true];
}

message ExecutorReadResponse {
  ExecutorRead item = 1;
}

message ExecutorListResponse {
  repeated ExecutorRead items = 1;
}

service DispatcherAdmin {
  rpc StartLoop(LoopCommandRequest) returns (CommandResponse);
  rpc PauseLoop(LoopCommandRequest) returns (CommandResponse);
  rpc ResumeLoop(LoopCommandRequest) returns (CommandResponse);
  rpc StopLoop(LoopCommandRequest) returns (CommandResponse);
  rpc ConfirmLoop(ConfirmLoopRequest) returns (CommandResponse);
  rpc StopRound(RoundCommandRequest) returns (CommandResponse);
  rpc StopStep(StepCommandRequest) returns (CommandResponse);
  rpc StopJob(JobCommandRequest) returns (CommandResponse);
  rpc StopTask(TaskCommandRequest) returns (CommandResponse);
  rpc TriggerDispatch(TriggerDispatchRequest) returns (CommandResponse);
  rpc GetRuntimeSummary(RuntimeSummaryRequest) returns (RuntimeSummaryResponse);
  rpc GetExecutor(ExecutorReadRequest) returns (ExecutorReadResponse);
  rpc ListExecutors(ExecutorListRequest) returns (ExecutorListResponse);
}
