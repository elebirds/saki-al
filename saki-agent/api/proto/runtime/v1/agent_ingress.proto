syntax = "proto3";

package saki.runtime.v1;

import "runtime/v1/agent_events.proto";

option go_package = "github.com/elebirds/saki/saki-agent/internal/gen/runtime/v1;runtimev1";

service AgentIngress {
  rpc Register(RegisterRequest) returns (RegisterResponse);
  rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);
  rpc PushTaskEvent(PushTaskEventRequest) returns (PushTaskEventResponse);
}

message RegisterRequest {
  string agent_id = 1;
  string version = 2;
  repeated string capabilities = 3;
  string transport_mode = 4;
  string control_base_url = 5;
  int32 max_concurrency = 6;
}

message RegisterResponse {
  bool accepted = 1;
  int64 heartbeat_interval_ms = 2;
}

message HeartbeatRequest {
  string agent_id = 1;
  string agent_version = 2;
  repeated string running_task_ids = 3;
  int32 max_concurrency = 4;
  int64 sent_at_unix_ms = 5;
}

message HeartbeatResponse {
  bool accepted = 1;
  int64 next_heartbeat_ms = 2;
}

message PushTaskEventRequest {
  TaskEventEnvelope event = 1;
}

message PushTaskEventResponse {
  bool accepted = 1;
}
