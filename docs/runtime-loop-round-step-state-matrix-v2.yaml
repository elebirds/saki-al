version: "2.0"
name: "saki-runtime-loop-round-step"
updated_at: "2026-02-14"

entities:
  loop:
    states:
      - DRAFT
      - RUNNING
      - PAUSED
      - STOPPING
      - STOPPED
      - COMPLETED
      - FAILED
    phases:
      ACTIVE_LEARNING:
        - AL_BOOTSTRAP
        - AL_TRAIN
        - AL_SCORE
        - AL_SELECT
        - AL_WAIT_USER
        - AL_EVAL
        - AL_FINALIZE
      SIMULATION:
        - SIM_BOOTSTRAP
        - SIM_TRAIN
        - SIM_SCORE
        - SIM_SELECT
        - SIM_ACTIVATE
        - SIM_EVAL
        - SIM_FINALIZE
      MANUAL:
        - MANUAL_BOOTSTRAP
        - MANUAL_TRAIN
        - MANUAL_EVAL
        - MANUAL_EXPORT
        - MANUAL_FINALIZE
  round:
    states:
      - PENDING
      - RUNNING
      - WAIT_USER
      - COMPLETED
      - CANCELLED
      - FAILED
  step:
    states:
      - PENDING
      - READY
      - RUNNING
      - SUCCEEDED
      - FAILED
      - CANCELLED
      - SKIPPED
    dispatch_kinds:
      - DISPATCHABLE
      - ORCHESTRATOR

mode_policies:
  ACTIVE_LEARNING:
    round_template:
      - { step_type: TRAIN, dispatch_kind: DISPATCHABLE }
      - { step_type: SCORE, dispatch_kind: DISPATCHABLE }
      - { step_type: EVAL, dispatch_kind: DISPATCHABLE }
      - { step_type: SELECT_TOPK, dispatch_kind: ORCHESTRATOR }
    round_complete_action: WAIT_USER
    requires_confirm: true
    confirm_guard: "new_labels_since(last_confirmed_commit_id) > 0 OR force = true"
  SIMULATION:
    round_template:
      - { step_type: TRAIN, dispatch_kind: DISPATCHABLE }
      - { step_type: SCORE, dispatch_kind: DISPATCHABLE }
      - { step_type: EVAL, dispatch_kind: DISPATCHABLE }
      - { step_type: SELECT_TOPK, dispatch_kind: ORCHESTRATOR }
      - { step_type: ACTIVATE_SAMPLES, dispatch_kind: ORCHESTRATOR }
      - { step_type: ADVANCE_BRANCH, dispatch_kind: ORCHESTRATOR }
    round_complete_action: AUTO_NEXT_ROUND
    requires_confirm: false
    cooldown_seconds: 5
  MANUAL:
    round_template:
      - { step_type: TRAIN, dispatch_kind: DISPATCHABLE }
      - { step_type: EVAL, dispatch_kind: DISPATCHABLE }
      - { step_type: EXPORT, dispatch_kind: DISPATCHABLE }
    round_complete_action: LOOP_COMPLETED
    requires_confirm: false
    default_max_rounds: 1

loop_transitions:
  - event: START
    from: [DRAFT, STOPPED]
    to: RUNNING
    guards: []
    effects:
      - "ensure_first_or_resumable_round"
      - "phase_to_mode_bootstrap"

  - event: PAUSE
    from: [RUNNING]
    to: PAUSED
    guards: []
    effects:
      - "stop_new_step_dispatch"

  - event: RESUME
    from: [PAUSED]
    to: RUNNING
    guards: []
    effects:
      - "resume_tick"

  - event: STOP
    from: [RUNNING, PAUSED]
    to: STOPPING
    guards: []
    effects:
      - "emit_cancel_for_inflight_steps"

  - event: STOPPING_DRAINED
    from: [STOPPING]
    to: STOPPED
    guards:
      - "all_inflight_steps_terminal"
    effects:
      - "terminal_reason=USER_STOP"

  - event: TICK_RETRY_STOPPING
    from: [STOPPING]
    to: STOPPING
    guards:
      - "exists_inflight_steps"
    effects:
      - "re_emit_cancel_idempotent"

  - event: POLICY_FINISH
    from: [RUNNING]
    to: COMPLETED
    guards:
      - "mode_policy_should_stop == true"
    effects:
      - "terminal_reason=SUCCESS"

  - event: UNRECOVERABLE_ERROR
    from: [RUNNING, STOPPING]
    to: FAILED
    guards: []
    effects:
      - "terminal_reason=SYSTEM_ERROR"

round_transitions:
  - event: ROUND_CREATED
    from: [PENDING]
    to: RUNNING
    guards: []
    effects:
      - "materialize_step_dag"

  - event: STEPS_ALL_SUCCEEDED
    from: [RUNNING]
    to: WAIT_USER
    guards:
      - "loop.mode == ACTIVE_LEARNING"
    effects:
      - "loop.phase=AL_WAIT_USER"

  - event: STEPS_ALL_SUCCEEDED
    from: [RUNNING]
    to: COMPLETED
    guards:
      - "loop.mode in [SIMULATION, MANUAL]"
    effects:
      - "write_round_summary"

  - event: STEP_TERMINAL_FAILURE
    from: [RUNNING]
    to: FAILED
    guards:
      - "failure_not_retriable"
    effects:
      - "write_terminal_reason"

  - event: USER_STOP
    from: [PENDING, RUNNING, WAIT_USER]
    to: CANCELLED
    guards: []
    effects:
      - "cancel_non_terminal_steps"

step_transitions:
  - event: DEPENDENCIES_READY
    from: [PENDING]
    to: READY
    guards:
      - "depends_on_steps_all_succeeded"
    effects: []

  - event: DISPATCH
    from: [READY]
    to: RUNNING
    guards:
      - "dispatch_kind == DISPATCHABLE"
      - "executor_available"
    effects:
      - "assign_executor"
      - "dispatch_request_id=uuid"

  - event: ORCHESTRATOR_RUN
    from: [READY]
    to: RUNNING
    guards:
      - "dispatch_kind == ORCHESTRATOR"
    effects:
      - "execute_in_controlplane"

  - event: SUCCESS
    from: [RUNNING]
    to: SUCCEEDED
    guards: []
    effects:
      - "persist_result_metrics_artifacts"

  - event: FAIL
    from: [RUNNING]
    to: FAILED
    guards: []
    effects:
      - "persist_error"

  - event: CANCEL
    from: [PENDING, READY, RUNNING]
    to: CANCELLED
    guards: []
    effects:
      - "best_effort_cancel_dispatchable"

  - event: RETRY
    from: [FAILED]
    to: READY
    guards:
      - "attempt < max_attempts"
      - "error_retriable"
    effects:
      - "attempt += 1"

idempotency:
  command:
    key: command_id
    table: runtime_command_log
    accepted_statuses: [accepted, applied, rejected, failed]
  step_event:
    key: [step_id, seq]
    table: step_event
  activate_samples:
    key: activation_key
    format: "loop_id + round_index + hash(sample_ids)"
    requirement: "same key must return same output_commit_id"

concurrency:
  locks:
    - name: loop_lock
      type: advisory_lock
      scope: per_loop
    - name: dispatch_scan_lock
      type: advisory_lock
      scope: global
  cas_updates:
    required: true
    fields:
      - loop.state
      - round.state
      - step.state
      - step.state_version

cleanup_policy:
  ttl_cleanup:
    enabled: true
    default_days:
      prediction_item: 14
      verbose_logs: 30
  ondemand_cleanup:
    action: cleanup_round_predictions
    keep:
      - selected_topk
      - round_summary
      - step_terminal_state
      - artifacts_manifest
    audit_table: cleanup_audit_log

acceptance:
  - "no_duplicate_round(loop_id, round_index)"
  - "no_duplicate_step(round_id, step_index)"
  - "stopping_reaches_stopped_after_restart"
  - "activate_samples_is_atomic_and_idempotent"
  - "loop_round_step_funnel_view_available"
