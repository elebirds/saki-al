[project]
name = "saki-executor"
version = "0.1.0"
description = "GPU runtime executor for Saki active learning platform"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "grpcio>=1.62.0",
    "httpx>=0.27.0",
    "loguru>=0.7.2",
    "pydantic>=2.7.0",
    "pydantic-settings>=2.2.1",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.7",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/saki_executor"]
