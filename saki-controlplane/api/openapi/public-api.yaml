openapi: 3.0.3
info:
  title: Saki Controlplane Public API
  version: 0.1.0
paths:
  /healthz:
    get:
      operationId: healthz
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /projects:
    get:
      operationId: listProjects
      responses:
        "200":
          description: project list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createProject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectRequest"
      responses:
        "201":
          description: created project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /projects/{project_id}:
    get:
      operationId: getProject
      parameters:
        - name: project_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: project detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /auth/login:
    post:
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: login result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokenResponse"
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /auth/me:
    get:
      operationId: getCurrentUser
      responses:
        "200":
          description: current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentUserResponse"
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /auth/permissions/{permission}:
    get:
      operationId: requirePermission
      parameters:
        - name: permission
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: permission granted
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /runtime/summary:
    get:
      operationId: getRuntimeSummary
      responses:
        "200":
          description: runtime summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeSummaryResponse"
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /runtime/executors:
    get:
      operationId: listRuntimeExecutors
      responses:
        "200":
          description: runtime executors
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RuntimeExecutor"
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /runtime/tasks/{task_id}/cancel:
    post:
      operationId: cancelRuntimeTask
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "202":
          description: runtime command accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeCommandResponse"
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /samples/{sample_id}/annotations:
    get:
      operationId: listSampleAnnotations
      parameters:
        - name: sample_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: sample annotations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Annotation"
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createSampleAnnotations
      parameters:
        - name: sample_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAnnotationRequest"
      responses:
        "201":
          description: created annotations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Annotation"
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
    Project:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: string
        name:
          type: string
    CreateProjectRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
    LoginRequest:
      type: object
      required:
        - user_id
      properties:
        user_id:
          type: string
        permissions:
          type: array
          items:
            type: string
    AuthTokenResponse:
      type: object
      required:
        - token
        - user_id
        - permissions
      properties:
        token:
          type: string
        user_id:
          type: string
        permissions:
          type: array
          items:
            type: string
    CurrentUserResponse:
      type: object
      required:
        - user_id
        - permissions
      properties:
        user_id:
          type: string
        permissions:
          type: array
          items:
            type: string
    RuntimeSummaryResponse:
      type: object
      required:
        - pending_tasks
        - running_tasks
        - leader_epoch
      properties:
        pending_tasks:
          type: integer
          format: int32
        running_tasks:
          type: integer
          format: int32
        leader_epoch:
          type: integer
          format: int64
    RuntimeExecutor:
      type: object
      required:
        - id
        - version
        - last_seen_at
      properties:
        id:
          type: string
        version:
          type: string
        last_seen_at:
          type: string
          format: date-time
    RuntimeCommandResponse:
      type: object
      required:
        - accepted
      properties:
        accepted:
          type: boolean
    Annotation:
      type: object
      required:
        - id
        - sample_id
        - group_id
        - label_id
        - view
        - annotation_type
        - geometry
        - attrs
        - source
        - is_generated
      properties:
        id:
          type: string
        sample_id:
          type: string
        group_id:
          type: string
        label_id:
          type: string
        view:
          type: string
        annotation_type:
          type: string
        geometry:
          type: object
          additionalProperties: true
        attrs:
          type: object
          additionalProperties: true
        source:
          type: string
        is_generated:
          type: boolean
    CreateAnnotationRequest:
      type: object
      required:
        - group_id
        - label_id
        - view
        - annotation_type
        - geometry
      properties:
        group_id:
          type: string
        label_id:
          type: string
        view:
          type: string
        annotation_type:
          type: string
        geometry:
          type: object
          additionalProperties: true
        attrs:
          type: object
          additionalProperties: true
        source:
          type: string
    ErrorResponse:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
        message:
          type: string
