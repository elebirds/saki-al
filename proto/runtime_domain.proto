syntax = "proto3";

package saki.runtime.domain.v1;
option go_package = "github.com/elebirds/saki/saki-dispatcher/internal/gen/runtimedomainv1;runtimedomainv1";

import "google/protobuf/struct.proto";

enum SelectorEncoding {
  SELECTOR_ENCODING_UNSPECIFIED = 0;
  SELECTOR_ENCODING_ROARING = 1;
  SELECTOR_ENCODING_RANGE = 2;
  SELECTOR_ENCODING_BITSET = 3;
}

message SelectorDigest {
  string snapshot_id = 1;
  SelectorEncoding encoding = 2;
  bytes selector_bytes = 3;
  uint32 cardinality = 4;
  string checksum = 5;
}

message DatasetManifestRef {
  string split = 1;
  bool is_static = 2;
  string snapshot_id = 3;
  string manifest_ref = 4;
  SelectorDigest selector = 5;
}

message BuildDatasetSnapshotRequest {
  string dataset_id = 1;
  string parent_snapshot_id = 2;
  uint32 seed = 3;
  bool lock_static_splits = 4;
  google.protobuf.Struct split_policy = 5;
  repeated string append_sample_uuids = 6;
  repeated string tombstone_sample_uuids = 7;
  string reason = 8;
}

message BuildDatasetSnapshotResponse {
  bool created = 1;
  string snapshot_id = 2;
  uint32 universe_size = 3;
  uint32 max_ordinal = 4;
  uint32 tombstone_count = 5;
}

message CreateRoundDatasetViewRequest {
  string loop_id = 1;
  string round_id = 2;
  string snapshot_id = 3;
  int32 round_index = 4;
  string mode = 5;
  bool simulation_mode = 6;
  google.protobuf.Struct plan = 7;
}

message CreateRoundDatasetViewResponse {
  bool created = 1;
  string round_id = 2;
  repeated DatasetManifestRef manifests = 3;
}

message GetRoundManifestRequest {
  string loop_id = 1;
  string round_id = 2;
  string split = 3;
}

message GetRoundManifestResponse {
  bool found = 1;
  DatasetManifestRef manifest = 2;
}

message ValidateSelectorRequest {
  SelectorDigest selector = 1;
}

message ValidateSelectorResponse {
  bool ok = 1;
  uint32 cardinality = 2;
  string checksum = 3;
  string reason = 4;
}

message GetBranchHeadRequest {
  string branch_id = 1;
}

message GetBranchHeadResponse {
  bool found = 1;
  string branch_id = 2;
  string project_id = 3;
  string branch_name = 4;
  string head_commit_id = 5;
}

message CountNewLabelsSinceCommitRequest {
  string project_id = 1;
  string branch_id = 2;
  string since_commit_id = 3;
}

message CountNewLabelsSinceCommitResponse {
  int64 new_label_count = 1;
  string latest_commit_id = 2;
}

message ActivateSamplesRequest {
  string command_id = 1;
  string project_id = 2;
  string branch_id = 3;
  string oracle_commit_id = 4;
  string source_commit_id = 5;
  string loop_id = 6;
  int32 round_index = 7;
  string query_strategy = 8;
  int32 topk = 9;
  string snapshot_id = 10;
  SelectorEncoding selector_encoding = 11;
  bytes selector_bytes = 12;
  uint32 selector_cardinality = 13;
  string selector_checksum = 14;
}

message ActivateSamplesResponse {
  bool created = 1;
  string commit_id = 2;
}

message AdvanceBranchHeadRequest {
  string command_id = 1;
  string branch_id = 2;
  string to_commit_id = 3;
  string reason = 4;
}

message AdvanceBranchHeadResponse {
  bool advanced = 1;
  string branch_id = 2;
  string head_commit_id = 3;
}

enum RuntimeQueryType {
  RUNTIME_QUERY_TYPE_UNSPECIFIED = 0;
  LABELS = 1;
  SAMPLES = 2;
  ANNOTATIONS = 3;
  UNLABELED_SAMPLES = 4;
}

message DataRequest {
  string request_id = 1;
  string step_id = 2;
  RuntimeQueryType query_type = 3;
  string project_id = 4;
  string commit_id = 5;
  string cursor = 6;
  int32 limit = 7;
  int32 preferred_chunk_bytes = 8;
  uint64 max_uncompressed_bytes = 9;
}

message LabelItem {
  string id = 1;
  string name = 2;
  string color = 3;
}

message SampleItem {
  string id = 1;
  string asset_hash = 2;
  string download_url = 3;
  int32 width = 4;
  int32 height = 5;
  google.protobuf.Struct meta = 6;
}

message AnnotationItem {
  string id = 1;
  string sample_id = 2;
  string category_id = 3;
  repeated double bbox_xywh = 4;
  google.protobuf.Struct obb = 5;
  string source = 6;
  double confidence = 7;
}

message DataItem {
  oneof item {
    LabelItem label_item = 1;
    SampleItem sample_item = 2;
    AnnotationItem annotation_item = 3;
  }
}

message DataResponse {
  string request_id = 1;
  string reply_to = 2;
  string step_id = 3;
  RuntimeQueryType query_type = 4;
  string payload_id = 5;
  uint32 chunk_index = 6;
  uint32 chunk_count = 7;
  bytes header_proto = 8;
  bytes payload_chunk = 9;
  uint64 payload_total_size = 10;
  uint32 payload_checksum_crc32c = 11;
  uint32 chunk_checksum_crc32c = 12;
  string next_cursor = 13;
  bool is_last_chunk = 14;
}

message UploadTicketRequest {
  string request_id = 1;
  string step_id = 2;
  string artifact_name = 3;
  string content_type = 4;
}

message UploadTicketResponse {
  string request_id = 1;
  string reply_to = 2;
  string step_id = 3;
  string upload_url = 4;
  string storage_uri = 5;
  map<string, string> headers = 6;
}

service RuntimeDomain {
  rpc GetBranchHead(GetBranchHeadRequest) returns (GetBranchHeadResponse);
  rpc CountNewLabelsSinceCommit(CountNewLabelsSinceCommitRequest) returns (CountNewLabelsSinceCommitResponse);
  rpc BuildDatasetSnapshot(BuildDatasetSnapshotRequest) returns (BuildDatasetSnapshotResponse);
  rpc CreateRoundDatasetView(CreateRoundDatasetViewRequest) returns (CreateRoundDatasetViewResponse);
  rpc GetRoundManifest(GetRoundManifestRequest) returns (GetRoundManifestResponse);
  rpc ValidateSelector(ValidateSelectorRequest) returns (ValidateSelectorResponse);
  rpc ActivateSamples(ActivateSamplesRequest) returns (ActivateSamplesResponse);
  rpc AdvanceBranchHead(AdvanceBranchHeadRequest) returns (AdvanceBranchHeadResponse);
  rpc QueryData(DataRequest) returns (stream DataResponse);
  rpc CreateUploadTicket(UploadTicketRequest) returns (UploadTicketResponse);
}
