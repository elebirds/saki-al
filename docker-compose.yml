services:
  saki-controlplane-public-api:
    image: golang:1.25
    container_name: saki-controlplane-public-api
    working_dir: /workspace/saki-controlplane
    command: ["go", "run", "./cmd/public-api"]
    environment:
      - DATABASE_DSN=${DATABASE_DSN:-postgres://postgres:postgres@postgres:5432/saki?sslmode=disable}
      - PUBLIC_API_BIND=${PUBLIC_API_BIND:-:8080}
      - AUTH_TOKEN_SECRET=${AUTH_TOKEN_SECRET:-dev-secret}
      - AUTH_TOKEN_TTL=${AUTH_TOKEN_TTL:-24h}
      - AUTH_BOOTSTRAP_PRINCIPALS=${AUTH_BOOTSTRAP_PRINCIPALS:-[]}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-minio:9000}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
      - MINIO_BUCKET_NAME=${MINIO_BUCKET_NAME:-saki-data}
      - MINIO_SECURE=${MINIO_SECURE:-false}
      - ASSET_READY_RETENTION_WINDOW=${ASSET_READY_RETENTION_WINDOW:-24h}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOG_FORMAT=${LOG_FORMAT:-AUTO}
    ports:
      - "8000:8080"
    volumes:
      - .:/workspace
      - gomodcache:/go/pkg/mod
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    restart: unless-stopped
    networks:
      - saki-network

  saki-controlplane-runtime:
    image: golang:1.25
    container_name: saki-controlplane-runtime
    working_dir: /workspace/saki-controlplane
    command: ["go", "run", "./cmd/runtime"]
    environment:
      - DATABASE_DSN=${DATABASE_DSN:-postgres://postgres:postgres@postgres:5432/saki?sslmode=disable}
      - RUNTIME_BIND=${RUNTIME_BIND:-:8081}
      - RUNTIME_ROLES=${RUNTIME_ROLES:-ingress,scheduler,delivery,recovery}
      - RUNTIME_ASSIGN_ACK_TIMEOUT=${RUNTIME_ASSIGN_ACK_TIMEOUT:-30s}
      - RUNTIME_AGENT_HEARTBEAT_TIMEOUT=${RUNTIME_AGENT_HEARTBEAT_TIMEOUT:-30s}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-minio:9000}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
      - MINIO_BUCKET_NAME=${MINIO_BUCKET_NAME:-saki-data}
      - MINIO_SECURE=${MINIO_SECURE:-false}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOG_FORMAT=${LOG_FORMAT:-AUTO}
    ports:
      - "8081:8081"
    volumes:
      - .:/workspace
      - gomodcache:/go/pkg/mod
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    restart: unless-stopped
    networks:
      - saki-network

  saki-agent:
    image: golang:1.25
    container_name: saki-agent
    working_dir: /workspace/saki-agent
    command: ["go", "run", "./cmd/agent"]
    environment:
      - RUNTIME_BASE_URL=${RUNTIME_BASE_URL:-http://saki-controlplane-runtime:8081}
      - AGENT_TRANSPORT_MODE=${AGENT_TRANSPORT_MODE:-pull}
      - AGENT_ID=${AGENT_ID:-agent-local}
      - AGENT_VERSION=${AGENT_VERSION:-0.1.0}
      - AGENT_MAX_CONCURRENCY=${AGENT_MAX_CONCURRENCY:-1}
      - AGENT_HEARTBEAT_INTERVAL=${AGENT_HEARTBEAT_INTERVAL:-30s}
      - AGENT_WORKER_COMMAND_JSON=${AGENT_WORKER_COMMAND_JSON:-[]}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      saki-controlplane-runtime:
        condition: service_started
    restart: unless-stopped
    volumes:
      - .:/workspace
      - gomodcache:/go/pkg/mod
    networks:
      - saki-network

  saki-web:
    build:
      context: ./saki-web
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=${VITE_API_BASE_URL:-http://localhost:8000}
    container_name: saki-web
    ports:
      - "80:80"
    depends_on:
      - saki-controlplane-public-api
    restart: unless-stopped
    networks:
      - saki-network

  postgres:
    image: postgres:16-alpine
    container_name: saki-postgres
    environment:
      POSTGRES_DB: ${SAKI_POSTGRES_DB:-saki}
      POSTGRES_USER: ${SAKI_POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${SAKI_POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - ${SAKI_DATA_DIR:-./data}/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SAKI_POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - saki-network

  minio:
    image: minio/minio:latest
    container_name: saki-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ${SAKI_DATA_DIR:-./data}/minio:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/live >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - saki-network

networks:
  saki-network:
    driver: bridge

volumes:
  gomodcache:
