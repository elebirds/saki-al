services:
  saki-api:
    build:
      context: ./saki-api
      dockerfile: Dockerfile
    container_name: saki-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL:-sqlite:///./saki.db}
      - SECRET_KEY=${SECRET_KEY:-YOUR_SUPER_SECRET_KEY_CHANGE_ME_IN_PRODUCTION}
      - BACKEND_CORS_ORIGINS=${BACKEND_CORS_ORIGINS:-["http://localhost:3000","http://localhost:5173","http://localhost"]}
      - UPLOAD_DIR=/app/data/uploads
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
    volumes:
      # 持久化数据库和上传文件
      - ./saki-api/data:/app/data
      - ./saki-api/saki.db:/app/saki.db
    restart: unless-stopped
    networks:
      - saki-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3

  saki-web:
    build:
      context: ./saki-web
      dockerfile: Dockerfile
      args:
        # 构建时设置 API 地址，如果使用 nginx 代理，可以设置为相对路径
        - VITE_API_BASE_URL=${VITE_API_BASE_URL:-/api/v1}
    container_name: saki-web
    ports:
      - "80:80"
    depends_on:
      - saki-api
    restart: unless-stopped
    networks:
      - saki-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  saki-network:
    driver: bridge

