openapi: 3.0.3
info:
  title: Saki Controlplane Public API
  version: 0.1.0
paths:
  /healthz:
    get:
      operationId: healthz
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /assets/uploads:init:
    post:
      operationId: initAssetUpload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssetUploadInitRequest"
      responses:
        "201":
          description: initialized asset upload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssetUploadInitResponse"
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /assets/{asset_id}:complete:
    post:
      operationId: completeAssetUpload
      parameters:
        - name: asset_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssetCompleteRequest"
      responses:
        "200":
          description: completed asset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Asset"
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /assets/{asset_id}:cancel:
    post:
      operationId: cancelAssetUpload
      parameters:
        - name: asset_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: canceled asset upload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssetUploadCancelResponse"
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /assets/{asset_id}:
    get:
      operationId: getAsset
      parameters:
        - name: asset_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: asset detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Asset"
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /assets/{asset_id}:sign-download:
    post:
      operationId: signAssetDownload
      parameters:
        - name: asset_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssetDownloadSignRequest"
      responses:
        "200":
          description: signed asset download
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssetDownloadSignResponse"
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /projects:
    get:
      operationId: listProjects
      responses:
        "200":
          description: project list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createProject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectRequest"
      responses:
        "201":
          description: created project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /projects/{project_id}:
    get:
      operationId: getProject
      parameters:
        - name: project_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: project detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /projects/{project_id}/datasets:
    get:
      operationId: listProjectDatasets
      parameters:
        - name: project_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: linked dataset ids
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
        "400":
          description: invalid project id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: project not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: linkProjectDatasets
      parameters:
        - name: project_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectDatasetLinkRequest"
      responses:
        "200":
          description: linked dataset ids created by this request
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
        "400":
          description: invalid project id or invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: project or dataset not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: unlinkProjectDatasets
      parameters:
        - name: project_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectDatasetLinkRequest"
      responses:
        "200":
          description: number of datasets unlinked by this request
          content:
            application/json:
              schema:
                type: integer
                format: int32
        "400":
          description: invalid project id or invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: project not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /projects/{project_id}/datasets/detail:
    get:
      operationId: listProjectDatasetDetails
      parameters:
        - name: project_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: linked dataset details
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Dataset"
        "400":
          description: invalid project id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: project not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /datasets:
    get:
      operationId: listDatasets
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            format: int32
            minimum: 1
            default: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 200
            default: 20
        - name: q
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: dataset list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DatasetListResponse"
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createDataset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDatasetRequest"
      responses:
        "201":
          description: created dataset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Dataset"
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /datasets/{dataset_id}:
    get:
      operationId: getDataset
      parameters:
        - name: dataset_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: dataset detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Dataset"
        "400":
          description: invalid dataset id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: dataset not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateDataset
      parameters:
        - name: dataset_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDatasetRequest"
      responses:
        "200":
          description: updated dataset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Dataset"
        "400":
          description: invalid dataset id or invalid dataset input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: dataset not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteDataset
      parameters:
        - name: dataset_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: dataset deleted
        "400":
          description: invalid dataset id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: dataset not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /datasets/{dataset_id}/samples/{sample_id}:
    delete:
      operationId: deleteDatasetSample
      parameters:
        - name: dataset_id
          in: path
          required: true
          schema:
            type: string
        - name: sample_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: sample deleted
        "400":
          description: invalid dataset id, invalid sample id, or sample does not belong to dataset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: sample not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /auth/login:
    post:
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: login result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokenResponse"
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /auth/me:
    get:
      operationId: getCurrentUser
      responses:
        "200":
          description: current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentUserResponse"
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /auth/permissions/{permission}:
    get:
      operationId: requirePermission
      parameters:
        - name: permission
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: permission granted
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /runtime/summary:
    get:
      operationId: getRuntimeSummary
      responses:
        "200":
          description: runtime summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeSummaryResponse"
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /runtime/executors:
    get:
      operationId: listRuntimeExecutors
      responses:
        "200":
          description: runtime executors
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RuntimeExecutor"
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /runtime/tasks/{task_id}/cancel:
    post:
      operationId: cancelRuntimeTask
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "202":
          description: runtime command accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeCommandResponse"
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /projects/{project_id}/samples/{sample_id}/annotations:
    get:
      operationId: listSampleAnnotations
      parameters:
        - name: project_id
          in: path
          required: true
          schema:
            type: string
        - name: sample_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: sample annotations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Annotation"
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createSampleAnnotations
      parameters:
        - name: project_id
          in: path
          required: true
          schema:
            type: string
        - name: sample_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAnnotationRequest"
      responses:
        "201":
          description: created annotations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Annotation"
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /imports/uploads:init:
    post:
      operationId: initImportUploadSession
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImportUploadInitRequest"
      responses:
        "201":
          description: initialized upload session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportUploadInitResponse"
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /imports/uploads/{session_id}/parts:sign:
    post:
      operationId: signImportUploadParts
      parameters:
        - name: session_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImportUploadPartSignRequest"
      responses:
        "200":
          description: signed upload parts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportUploadPartSignResponse"
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /imports/uploads/{session_id}:complete:
    post:
      operationId: completeImportUploadSession
      parameters:
        - name: session_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImportUploadCompleteRequest"
      responses:
        "200":
          description: completed upload session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportUploadSession"
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /imports/uploads/{session_id}:abort:
    post:
      operationId: abortImportUploadSession
      parameters:
        - name: session_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: aborted upload session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportUploadAbortResponse"
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /imports/uploads/{session_id}:
    get:
      operationId: getImportUploadSession
      parameters:
        - name: session_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: upload session detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportUploadSession"
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /projects/{project_id}/datasets/{dataset_id}/imports/annotations:prepare:
    post:
      operationId: prepareProjectAnnotationImport
      parameters:
        - name: project_id
          in: path
          required: true
          schema:
            type: string
        - name: dataset_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PrepareProjectAnnotationImportRequest"
      responses:
        "200":
          description: import preview result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrepareProjectAnnotationImportResponse"
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /projects/{project_id}/datasets/{dataset_id}/imports/annotations:execute:
    post:
      operationId: executeProjectAnnotationImport
      parameters:
        - name: project_id
          in: path
          required: true
          schema:
            type: string
        - name: dataset_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExecuteProjectAnnotationImportRequest"
      responses:
        "202":
          description: import task created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportTaskCreateResponse"
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /imports/tasks/{task_id}:
    get:
      operationId: getImportTask
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: import task status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportTaskStatusResponse"
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /imports/tasks/{task_id}/result:
    get:
      operationId: getImportTaskResult
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: import task result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportTaskResultResponse"
        default:
          description: unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    Asset:
      type: object
      required:
        - id
        - kind
        - status
        - storage_backend
        - bucket
        - object_key
        - content_type
        - size_bytes
        - metadata
      properties:
        id:
          type: string
        kind:
          type: string
        status:
          type: string
        storage_backend:
          type: string
        bucket:
          type: string
        object_key:
          type: string
        content_type:
          type: string
        size_bytes:
          type: integer
          format: int64
        sha256_hex:
          type: string
          nullable: true
        metadata:
          type: object
          additionalProperties: true
    AssetUploadInitRequest:
      type: object
      additionalProperties: false
      required:
        - owner_type
        - owner_id
        - role
        - is_primary
        - idempotency_key
        - kind
        - content_type
        - metadata
      properties:
        owner_type:
          type: string
          enum:
            - project
            - dataset
            - sample
        owner_id:
          type: string
          format: uuid
        role:
          type: string
          enum:
            - attachment
            - primary
        is_primary:
          type: boolean
        idempotency_key:
          type: string
        kind:
          type: string
        content_type:
          type: string
        metadata:
          type: object
          additionalProperties: true
    AssetUploadInitResponse:
      type: object
      required:
        - asset
        - intent_state
      properties:
        asset:
          $ref: "#/components/schemas/Asset"
        intent_state:
          type: string
          enum:
            - initiated
            - completed
            - canceled
            - expired
        upload_url:
          type: string
          nullable: true
        expires_in:
          type: integer
          format: int32
          nullable: true
    AssetUploadCancelResponse:
      type: object
      required:
        - asset_id
        - intent_state
      properties:
        asset_id:
          type: string
          format: uuid
        intent_state:
          type: string
          enum:
            - initiated
            - completed
            - canceled
            - expired
    AssetCompleteRequest:
      type: object
      additionalProperties: false
      properties:
        size_bytes:
          type: integer
          format: int64
        sha256_hex:
          type: string
    AssetDownloadSignRequest:
      type: object
      additionalProperties: false
    AssetDownloadSignResponse:
      type: object
      required:
        - asset_id
        - download_url
        - expires_in
      properties:
        asset_id:
          type: string
        download_url:
          type: string
        expires_in:
          type: integer
          format: int32
    HealthResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
    Project:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: string
        name:
          type: string
    Dataset:
      type: object
      required:
        - id
        - name
        - type
      properties:
        id:
          type: string
        name:
          type: string
        type:
          type: string
    DatasetListResponse:
      type: object
      required:
        - items
        - total
        - offset
        - limit
        - size
        - has_more
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Dataset"
        total:
          type: integer
          format: int32
        offset:
          type: integer
          format: int32
        limit:
